# ==============================================================================
# PROCESSED DATA
# ==============================================================================

processed:

  ids:
    local_dir: "01_ids/data/processed"
    files:
      merged:
        filename: "ids_all_regions.gpkg"
        description: "All regions merged into single file"
      cleaned:
        filename: "ids_layers_cleaned.gpkg"
        description: "After QC and cleaning"
    # Derived IDS products (spatial assignment + area metrics)
    derived:
      output_dir: "processed/ids"
      damage_area_to_surveyed_area:
        filename: "damage_area_to_surveyed_area.parquet"
        description: "Spatial assignment of damage areas to surveyed areas (max overlap)"
        columns: "DAMAGE_AREA_ID, SURVEYED_AREA_ID, overlap_m2, match_quality_flag"
      damage_area_area_metrics:
        filename: "damage_area_area_metrics.parquet"
        description: "Area metrics in EPSG:5070: damage_area_m2, survey_area_m2, damage_frac_of_survey"
        columns: "DAMAGE_AREA_ID, damage_area_m2, SURVEYED_AREA_ID, survey_area_m2, damage_frac_of_survey"

  fia:
    local_dir: "05_fia/data/processed"
    trees:
      output_dir: "05_fia/data/processed/trees"
      description: "Tree-level BA and stem metrics, hive-partitioned by state"
      columns: "PLT_CN, INVYR, SPCD, SFTWD_HRDWD, STATUSCD, size_class, canopy_layer, ba_sqft, ba_per_acre, n_trees_tpa, n_trees_raw"
    seedlings:
      output_dir: "05_fia/data/processed/seedlings"
      description: "Seedling counts by species per plot visit, hive-partitioned by state"
      columns: "PLT_CN, INVYR, SPCD, SFTWD_HRDWD, treecount_total"
    mortality:
      output_dir: "05_fia/data/processed/mortality"
      description: "Between-measurement mortality from TREE_GRM_COMPONENT, hive-partitioned by state"
      columns: "PLT_CN, INVYR, SPCD, SFTWD_HRDWD, AGENTCD, component_type, tpamort_per_acre"
    cond:
      output_dir: "05_fia/data/processed/cond"
      description: "Condition-level attributes per plot visit, hive-partitioned by state"
      columns: "PLT_CN, INVYR, STATECD, CONDID, FORTYPCD, COND_STATUS_CD, CONDPROP_UNADJ, LAT, LON, DSTRBCD1, DSTRBCD2, DSTRBCD3, DSTRBYR1, DSTRBYR2, DSTRBYR3"
    damage_agents:
      output_dir: "05_fia/data/processed/damage_agents"
      description: "Live-tree damage agent codes (DAMAGE_AGENT_CD1/2/3) aggregated to plot x INVYR x CONDID x species, hive-partitioned by state"
      columns: "PLT_CN, INVYR, CONDID, SPCD, SFTWD_HRDWD, DAMAGE_AGENT_CD, ba_per_acre, n_trees_tpa"
    harvest_flags:
      output_dir: "05_fia/data/processed/harvest_flags"
      description: "Per-plot flags for incidental harvest based on AGENTCD 80-89 (cause-of-death codes on dead trees), hive-partitioned by state"
      columns: "PLT_CN, INVYR, STATECD"
    summaries:
      output_dir: "05_fia/data/processed/summaries"
      description: "Plot-level aggregated metrics: BA totals, diversity indices, disturbance history, damage agents"
      files:
        plot_tree_metrics: "plot_tree_metrics.parquet"
        plot_tree_species: "plot_tree_species.parquet"
        plot_sapling_species: "plot_sapling_species.parquet"
        plot_seedling_metrics: "plot_seedling_metrics.parquet"
        plot_seedling_species: "plot_seedling_species.parquet"
        plot_mortality_metrics: "plot_mortality_metrics.parquet"
        plot_cond_fortypcd: "plot_cond_fortypcd.parquet"
        plot_disturbance_history: "plot_disturbance_history.parquet"
        plot_damage_agents: "plot_damage_agents.parquet"

  species_niches:
    local_dir: "06_species_niches/data/processed"
    output_dir: "06_species_niches/data/processed"
    description: "Species-level BIEN range and TerraClimate niche products for thermophilization and community climate-affinity analyses"
    raw_dir: "06_species_niches/data/raw"
    range_dir: "06_species_niches/data/raw/bien_ranges"
    files:
      species_universe: "species_universe.parquet"
      bien_range_availability: "bien_range_availability.parquet"
      species_range_polygons: "species_range_polygons.gpkg"
      species_range_climate: "species_range_climate.parquet"
      species_climate_niches: "species_climate_niches.parquet"

  thermophilization:
    local_dir: "07_thermophilization/data/processed"
    output_dir: "07_thermophilization/data/processed"
    description: "Analysis-ready recruitment climate-affinity products built from FIA communities and species niche tables"
    files:
      plot_recruitment_cwm: "plot_recruitment_cwm.parquet"
      analysis_cohort: "plot_recruitment_analysis_cohort.parquet"
      plot_disturbance_severity: "plot_disturbance_severity.parquet"
      plot_community_climate_seedlings: "plot_community_climate_seedlings.parquet"
      plot_community_climate_saplings: "plot_community_climate_saplings.parquet"
      plot_community_climate_trees: "plot_community_climate_trees.parquet"
      plot_year_community_cwm_seedlings: "plot_year_community_cwm_seedlings.parquet"
      plot_year_community_cwm_saplings: "plot_year_community_cwm_saplings.parquet"
      plot_year_community_cwm_trees: "plot_year_community_cwm_trees.parquet"
      plot_year_climate_change_seedlings: "plot_year_climate_change_seedlings.parquet"
      plot_year_climate_change_saplings: "plot_year_climate_change_saplings.parquet"
      plot_year_climate_change_trees: "plot_year_climate_change_trees.parquet"
    # Single configurable place to grade a plot visit as "high severity fire."
    # column: which plot_disturbance_severity.parquet column to threshold
    #   (prop_crown_fire = share of the whole plot, forested_prop_crown_fire =
    #   share of forested area only). Both are FIA crown-fire (DSTRBCD 32) area
    #   coverage, not a derived label. threshold is left null until reviewed;
    #   07_thermophilization/scripts/03_build_plot_disturbance_severity.R writes
    #   is_high_severity_fire = NA for every row until a threshold is set here.
    high_severity_fire:
      column: "prop_crown_fire"
      threshold: null

    # ------------------------------------------------------------------------
    # Pre/post-disturbance survey coverage QA.
    # Driven by: 07_thermophilization/qa/02_disturbance_survey_coverage.R
    #
    # Answers, for any disturbance type you designate below: "how many stable
    # plots have an FIA survey BEFORE and AFTER the disturbance?" -- the plots
    # that could support a before/after comparison of that disturbance.
    #
    # FIA reality worth knowing before you read the counts:
    #   * FIA records a condition disturbance code only when the event killed or
    #     damaged >= 25% of the trees in that condition (and >= 1 acre). "No
    #     disturbance code" therefore means "not severe enough to cross FIA's
    #     threshold," NOT "definitely undisturbed."
    #   * FIA's condition disturbance code CANNOT isolate bark beetle. "insect"
    #     (10/11/12) is the finest available and lumps all insects together.
    #   * "crown_fire" (DSTRBCD 32) is the closest FIA has to high-severity fire.
    #   * A disturbance year of 9999 means "continuous / unknown year" and cannot
    #     be placed before/after a survey; those events are excluded from the
    #     before/after test and prevent a plot from qualifying for the
    #     first-disturbance rule below because event order is unknowable.
    disturbance_survey_coverage:
      # Friendly type name -> FIA COND.DSTRBCD code set.
      # An empty list ([]) means "any recorded disturbance code."
      # To target a new type, add a name here and reference it in a query.
      disturbance_types:
        any: []
        fire: [30, 31, 32]
        crown_fire: [32]
        insect: [10, 11, 12]      # closest available to "bark beetle" (not specific)
        disease: [20, 21, 22]
        wind: [52]
        drought: [54]
      # Each query counts stable plots meeting all of its conditions.
      #   name:                   label used in the QA outputs.
      #   types:                   one or more names from disturbance_types above
      #                            (their code sets are unioned).
      #   min_surveys_before:      survey years required strictly before the
      #                            disturbance year (default 1).
      #   min_surveys_after:       survey years required on/after the disturbance
      #                            year (default 1). The visit that records the
      #                            disturbance counts as an "after" survey.
      #   first_disturbance_only: if true, the event of interest must be the
      #                           plot's first dated disturbance of any type.
      #                           Plots with unknown/continuous disturbance timing
      #                           are excluded because "no prior disturbance"
      #                           cannot be established. Later events are allowed,
      #                           but qualifying post-event surveys must precede
      #                           the next dated disturbance (default false).
      queries:
        - name: any_disturbance_before_after
          types: [any]
          min_surveys_before: 1
          min_surveys_after: 1
          first_disturbance_only: false
        - name: fire_before_after
          types: [fire]
          min_surveys_before: 1
          min_surveys_after: 1
          first_disturbance_only: false
        - name: crown_fire_before_after
          types: [crown_fire]
          min_surveys_before: 1
          min_surveys_after: 1
          first_disturbance_only: false
        - name: insect_before_after
          types: [insect]
          min_surveys_before: 1
          min_surveys_after: 1
          first_disturbance_only: false
        # Clean-baseline subsets: the studied event is the plot's first recorded
        # disturbance, with a survey before it and before any later disturbance.
        - name: first_disturbance_before_after
          types: [any]
          min_surveys_before: 1
          min_surveys_after: 1
          first_disturbance_only: true
        - name: first_fire_before_after
          types: [fire]
          min_surveys_before: 1
          min_surveys_after: 1
          first_disturbance_only: true
        - name: first_insect_before_after
          types: [insect]
          min_surveys_before: 1
          min_surveys_after: 1
          first_disturbance_only: true

  # Links FIA plots to external dated disturbance sources (MTBS fire severity,
  # IDS insect agents) via buffered plot footprints. Feeds a future
  # disturbance-aware pass of 07_thermophilization. See 08_disturbance_linkage/.
  disturbance_linkage:
    output_dir: "08_disturbance_linkage/data/processed"
    description: "Per-plot dated fire-severity (MTBS) and insect-agent (IDS) event tables keyed on stable_plot_id"
    buffer_m: 800               # plot footprint radius around the FIA coordinate
    area_crs: "EPSG:5070"       # Conus Albers equal-area; buffers/overlays done here
    inputs:
      # FIA plot coordinates (carries stable_plot_id, PLT_CN, INVYR, LAT, LON).
      fia_plot_source: "05_fia/data/processed/summaries/plot_condition_metadata.parquet"
      # Cleaned IDS aerial-detection-survey layers (already in the repo).
      ids_layers: "01_ids/data/processed/ids_layers_cleaned.gpkg"
      # MTBS annual burn-severity mosaics -- USER-PROVIDED, not in the repo.
      # Download from https://www.mtbs.gov/ into this directory (one raster/year).
      mtbs_raw_dir: "08_disturbance_linkage/data/raw/mtbs"
    files:
      plot_footprints: "plot_footprints.gpkg"
      plot_mtbs_fire_events: "plot_mtbs_fire_events.parquet"
      plot_ids_agent_events: "plot_ids_agent_events.parquet"
      plot_disturbance_linkage_events: "plot_disturbance_linkage_events.parquet"
    mtbs:
      # MTBS thematic burn-severity mosaic pixel values.
      severity_classes:
        1: "unburned_to_low"
        2: "low"
        3: "moderate"
        4: "high"
        5: "increased_greenness"
        6: "non_processing_mask"
      # Which class(es) count as high-severity when summarizing per plot.
      high_severity_classes: [4]
      # Class 6 is a non-processing mask, not a severity observation. It is
      # excluded from valid-pixel denominators and reported separately.
      non_processing_classes: [6]

  # Standardized climate outputs (long format, dataset-agnostic)
  climate:
    output_dir: "processed/climate"
    description: "Standardized long-format climate data per dataset"
    note: "Each dataset has a damage_areas_summaries/ directory with per-variable parquet files"
    damage_areas_summaries:
      description: "Area-weighted climate summaries per DAMAGE_AREA_ID per variable per time step"
      format: "Per-variable parquet files in damage_areas_summaries/ directory (read with open_dataset())"
      columns: "OBSERVATION_ID, DAMAGE_AREA_ID, calendar_year, calendar_month, water_year, water_year_month, variable, weighted_mean, value_min, value_max, n_pixels, n_pixels_with_data, sum_coverage_fraction"

  # Climate pixel maps (observation -> pixel mapping)
  pixel_maps:
    local_dir: "data/processed/pixel_maps"
    description: "Maps IDS observations to climate raster pixels"
    files:
      terraclimate:
        damage_areas: "terraclimate_damage_areas_pixel_map.parquet"
        damage_points: "terraclimate_damage_points_pixel_map.parquet"
        surveyed_areas: "terraclimate_surveyed_areas_pixel_map.parquet"
      prism:
        damage_areas: "prism_damage_areas_pixel_map.parquet"
        damage_points: "prism_damage_points_pixel_map.parquet"
        surveyed_areas: "prism_surveyed_areas_pixel_map.parquet"
      worldclim:
        damage_areas: "worldclim_damage_areas_pixel_map.parquet"
        damage_points: "worldclim_damage_points_pixel_map.parquet"
        surveyed_areas: "worldclim_surveyed_areas_pixel_map.parquet"
      # era5: (deferred - see archive/05_era5/ for configuration)

  # Climate pixel values (climate data per pixel per time)
  pixel_values:
    description: "Climate values at each unique pixel for each time step"
    note: "Stored as yearly parquet files: {prefix}_{year}.parquet"

# ==============================================================================
# PARAMETERS
# ==============================================================================

params:
  # Full study area (US including Alaska)
  study_area:
    description: "US bounding box including Alaska"
    xmin: -180
    xmax: -64
    ymin: 17
    ymax: 72
  # CONUS only (for PRISM)
  study_area_conus:
    description: "Contiguous US bounding box"
    xmin: -125
    xmax: -66
    ymin: 24
    ymax: 50
  time_range:
    start_year: 1997
    end_year: 2024
  crs: "EPSG:4326"
  area_crs: "EPSG:5070"  # Conus Albers Equal Area for area calculations
  global_area_crs: "EPSG:6933"  # Global equal-area CRS for BIEN range QA
  water_year:
    description: "US hydrological convention: Oct-Sep"
    note: "month >= 10: water_year = calendar_year + 1, water_year_month = month - 9"
